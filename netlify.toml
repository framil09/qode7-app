[build]
command = "npm run build"
publish = "dist/public"
functions = "dist"

[dev]
command = "npm run dev"
port = 5173

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production.environment]
NODE_VERSION = "20"

[context.deploy-preview.environment]
NODE_VERSION = "20"

[context.branch-deploy.environment]
NODE_VERSION = "20"
